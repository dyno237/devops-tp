name: Build

on:
  push:
    branches:
      - "release-please--**"
      - "projet-dyno"
      - "main"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version à builder (ex: 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  build:
    name: Build & Push via Cloud Build
    runs-on: ubuntu-latest
    
    outputs:
      image_tag: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extraire la version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build via Cloud Build
        # On met tout sur une ligne pour éviter les erreurs d'espaces invisibles
        run: gcloud builds submit --config=cloudbuild.yaml --project=${{ secrets.GCP_PROJECT_ID }} --substitutions=SHORT_SHA=${{ steps.version.outputs.version }}
